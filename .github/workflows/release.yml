name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk release-assets/PocketDither-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk release-assets/PocketDither-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/PocketDither-debug.apk
            release-assets/PocketDither-release-unsigned.apk
          body: |
            Included assets:
            - `PocketDither-debug.apk`: installable debug build.
            - `PocketDither-release-unsigned.apk`: unsigned release artifact for signing workflows.
